<!DOCTYPE html>

  <title>Net Zero VR — EMERSYS</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; }

    /* Loading screen */
    #loader {
      position: fixed; inset: 0;
      background: #030a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      font-family: 'Courier New', monospace;
      color: #00e5ff;
      transition: opacity 0.8s ease;
    }
    #loader h1 {
      font-size: 2rem; letter-spacing: 0.3em;
      margin: 0 0 8px; text-transform: uppercase;
    }
    #loader p {
      font-size: 0.85rem; opacity: 0.5;
      letter-spacing: 0.15em; margin: 0 0 32px;
    }
    .progress-bar {
      width: 280px; height: 2px;
      background: rgba(0,229,255,0.15);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #00e5ff;
      width: 0%; animation: load 2.5s ease forwards;
    }
    @keyframes load { to { width: 100%; } }

    /* Topic label overlay (shows current topic name) */
    #topic-label {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      color: #fff; font-family: 'Courier New', monospace;
      font-size: 0.9rem; letter-spacing: 0.1em;
      padding: 10px 24px; border-radius: 4px;
      border: 1px solid rgba(0,229,255,0.3);
      display: none; z-index: 100;
      pointer-events: none;
    }

    /* Controls hint */
    #controls-hint {
      position: fixed; top: 20px; right: 20px;
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: 0.72rem; line-height: 1.7;
      letter-spacing: 0.05em;
      text-align: right; z-index: 100;
      pointer-events: none;
    }
  </style>
</head>

<!-- ============================================================
     JAVASCRIPT — Interaction Logic
============================================================ -->
<script>
  // ── Hide loader after scene loads ──────────────────────────
  const loader = document.getElementById('loader');
  const scene  = document.querySelector('a-scene');

  scene.addEventListener('loaded', () => {
    setTimeout(() => {
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 800);
    }, 1000);
  });

  // ── Video State Tracker ────────────────────────────────────
  const videoState = {};   // { videoId: 'playing' | 'paused' | 'stopped' }
  const topicLabel = document.getElementById('topic-label');
  let labelTimeout;

  function showLabel(text) {
    topicLabel.textContent = text;
    topicLabel.style.display = 'block';
    clearTimeout(labelTimeout);
    labelTimeout = setTimeout(() => {
      topicLabel.style.display = 'none';
    }, 3000);
  }

  // ── Button Click Handler ───────────────────────────────────
  function handleButtonClick(el) {
    const videoId = el.getAttribute('data-video-id');
    const screenId = el.getAttribute('data-screen');
    const topic    = el.getAttribute('data-topic');
    const videoEl  = document.getElementById(videoId);
    const screenEl = document.getElementById(screenId);
    const btnBox   = el.querySelector('.btn-box') || el.querySelector('a-box');
    const btnText  = el.querySelector('a-text');

    if (!videoEl) return;

    const state = videoState[videoId] || 'stopped';

    if (state === 'playing') {
      // PAUSE
      videoEl.pause();
      videoState[videoId] = 'paused';
      if (btnBox) btnBox.setAttribute('color', '#003344');
      if (btnText) btnText.setAttribute('value', '▶  PLAY');
      showLabel('⏸  Paused · ' + topic);
    } else {
      // PLAY
      videoEl.play().catch(e => console.warn('Autoplay blocked:', e));
      videoState[videoId] = 'playing';
      if (btnBox) btnBox.setAttribute('color', '#004455');
      if (btnText) btnText.setAttribute('value', '⏸  PAUSE');
      showLabel('▶  Playing · ' + topic);
    }
  }

  // ── Register click events on all play buttons ──────────────
  scene.addEventListener('loaded', () => {

    // Buttons
    document.querySelectorAll('.play-btn').forEach(btn => {
      btn.addEventListener('click', () => handleButtonClick(btn));
    });

    // Also allow clicking directly on screen to play
    document.querySelectorAll('.screen').forEach(screen => {
      screen.addEventListener('click', () => {
        const videoId = screen.getAttribute('data-video-id');
        const topic   = screen.getAttribute('data-topic');

        // Find corresponding button
        const btn = document.querySelector(
          `.play-btn[data-video-id="${videoId}"]`
        );
        if (btn) handleButtonClick(btn);
      });
    });

    // Hover effect on buttons
    document.querySelectorAll('.play-btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        const box = btn.querySelector('a-box');
        if (box) box.setAttribute('color', '#005566');
      });
      btn.addEventListener('mouseleave', () => {
        const box = btn.querySelector('a-box');
        const vid = btn.getAttribute('data-video-id');
        const state = videoState[vid] || 'stopped';
        if (box) box.setAttribute('color', state === 'playing' ? '#004455' : '#003344');
      });
    });

  });

  // ── Pointer lock helper for PC ─────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      // ESC already releases pointer lock natively
    }
  });

  // Click anywhere to re-lock cursor on PC
  document.querySelector('a-scene').addEventListener('click', () => {
    const canvas = document.querySelector('canvas');
    if (canvas && document.pointerLockElement !== canvas) {
      canvas.requestPointerLock();
    }
  });
</script>
